<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <h1>Login Form</h1>
            <label for="">Username:</label>
            <input type="text" id="username" placeholder="username"><br><br>
            <label for="">Password</label>
            <input type="text" id="password" placeholder="password"><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Cancel</button>


        </fieldset>


    </form>
    <script>
        let uName=document.getElementById("username");        
        let psw=document.getElementById("password");        
        let form=document.querySelector("form");    
        
         form.addEventListener("submit" , (e) => {
            e.preventDefault()
            console.log("Username:" + uName.value);
            console.log("Password:" + psw.value);

            window.localStorage.setItem("username:",uName.value)
            window.localStorage.setItem("password:",psw.value)
            //localStorage.setItem() is used to store data in local storage in key value format
            //This local storage permanent storage because data not delete even browser close

            let storedUsername= window.localStorage.getItem("username");
            let storedpassword= window.localStorage.getItem("password");
            console.log("stored Username:" + storedUsername);
            console.log("stored password:" + storedpassword);
            
        })

    </script>
</body>
</html>
